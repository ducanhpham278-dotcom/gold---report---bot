name: Receive Price from TradingView

on:
  repository_dispatch:
    types: [price_update, gia_chuan_update, ohlc_d1_update]

jobs:
  save_price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Luu gia vao file
        run: |
          mkdir -p data
          EVENT_TYPE="${{ github.event.action }}"

          if [ "$EVENT_TYPE" = "gia_chuan_update" ]; then
            echo '{
              "open":  "${{ github.event.client_payload.open }}",
              "high":  "${{ github.event.client_payload.high }}",
              "low":   "${{ github.event.client_payload.low }}",
              "close": "${{ github.event.client_payload.close }}",
              "time":  "${{ github.event.client_payload.time }}"
            }' > data/gia_chuan.json
            echo "✅ Saved Gia Chuan 21:00 ICT"
            cat data/gia_chuan.json

          elif [ "$EVENT_TYPE" = "ohlc_d1_update" ]; then
            echo '{
              "open":  "${{ github.event.client_payload.open }}",
              "high":  "${{ github.event.client_payload.high }}",
              "low":   "${{ github.event.client_payload.low }}",
              "close": "${{ github.event.client_payload.close }}",
              "date":  "${{ github.event.client_payload.date }}"
            }' > data/ohlc_d1.json
            echo "✅ Saved OHLC D1"
            cat data/ohlc_d1.json

          else
            echo '{
              "open":  "${{ github.event.client_payload.open }}",
              "high":  "${{ github.event.client_payload.high }}",
              "low":   "${{ github.event.client_payload.low }}",
              "close": "${{ github.event.client_payload.close }}",
              "time":  "${{ github.event.client_payload.time }}"
            }' > data/latest_h1.json
            echo "✅ Saved latest H1"
            cat data/latest_h1.json
          fi

      - name: Commit va push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Update price: ${{ github.event.action }}" || echo "No changes"
          git push
