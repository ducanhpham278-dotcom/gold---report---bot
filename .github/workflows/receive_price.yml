name: Receive Price from TradingView

on:
  repository_dispatch:
    types: [price_update, gia_chuan_update, ohlc_d1_update, ohlc_w1_update]

jobs:
  save_price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Luu gia vao file
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD_OPEN:  ${{ github.event.client_payload.open }}
          PAYLOAD_HIGH:  ${{ github.event.client_payload.high }}
          PAYLOAD_LOW:   ${{ github.event.client_payload.low }}
          PAYLOAD_CLOSE: ${{ github.event.client_payload.close }}
          PAYLOAD_TIME:  ${{ github.event.client_payload.time }}
          PAYLOAD_DATE:  ${{ github.event.client_payload.date }}
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import os, json

          event_type = os.environ.get("EVENT_TYPE", "")
          o    = os.environ.get("PAYLOAD_OPEN",  "")
          h    = os.environ.get("PAYLOAD_HIGH",  "")
          l    = os.environ.get("PAYLOAD_LOW",   "")
          c    = os.environ.get("PAYLOAD_CLOSE", "")
          t    = os.environ.get("PAYLOAD_TIME",  "")
          date = os.environ.get("PAYLOAD_DATE",  "")

          data = {"open": o, "high": h, "low": l, "close": c}

          if event_type == "gia_chuan_update":
              data["time"] = t
              # Luu file chinh
              with open("data/gia_chuan.json", "w") as f:
                  json.dump(data, f, indent=2)
              print(f"✅ Saved gia_chuan.json")

          elif event_type == "ohlc_d1_update":
              data["date"] = date
              # Luu file chinh (nen gan nhat)
              with open("data/ohlc_d1.json", "w") as f:
                  json.dump(data, f, indent=2)
              # Luu file lich su theo ngay
              if date:
                  fname = f"data/ohlc_d1_{date}.json"
                  with open(fname, "w") as f:
                      json.dump(data, f, indent=2)
                  print(f"✅ Saved ohlc_d1.json + {fname}")
              else:
                  print(f"✅ Saved ohlc_d1.json")

          elif event_type == "ohlc_w1_update":
              data["date"] = date
              # Luu file W1 chinh
              with open("data/ohlc_w1.json", "w") as f:
                  json.dump(data, f, indent=2)
              # Luu file lich su theo tuan
              if date:
                  fname = f"data/ohlc_w1_{date}.json"
                  with open(fname, "w") as f:
                      json.dump(data, f, indent=2)
                  print(f"✅ Saved ohlc_w1.json + {fname}")
              else:
                  print(f"✅ Saved ohlc_w1.json")

          else:  # price_update
              data["time"] = t
              with open("data/latest_h1.json", "w") as f:
                  json.dump(data, f, indent=2)
              print(f"✅ Saved latest_h1.json")
          PYEOF

      - name: Commit va push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Update: ${{ github.event.action }} ${{ github.event.client_payload.date }}" || echo "No changes"
          git pull --rebase origin main || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ducanhpham278-dotcom/gold---report---bot.git HEAD:main
