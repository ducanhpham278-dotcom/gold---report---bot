name: Receive EMA RSI from TradingView

on:
  repository_dispatch:
    types: [ema_rsi_update]

jobs:
  save_ema_rsi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Luu EMA RSI vao file
        run: |
          mkdir -p data
          TF="${{ github.event.client_payload.tf }}"
          DATA='${{ github.event.client_payload.data }}'
          echo "$DATA" > data/ema_rsi_${TF}.json
          echo "✅ Saved EMA/RSI for tf=$TF"
          cat data/ema_rsi_${TF}.json

      - name: Commit va push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TF="${{ github.event.client_payload.tf }}"
          git add data/ema_rsi_${TF}.json
          git commit -m "Update EMA/RSI tf=${TF}" || echo "No changes"
          git push
