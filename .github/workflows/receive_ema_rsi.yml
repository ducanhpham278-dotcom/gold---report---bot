name: Receive EMA RSI from TradingView

on:
  repository_dispatch:
    types: [ema_rsi_update]

jobs:
  save_ema_rsi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Luu EMA RSI vao file
        env:
          TF:   ${{ github.event.client_payload.tf }}
          DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import os, json

          tf       = os.environ.get("TF", "unknown")
          data_raw = os.environ.get("DATA", "{}")

          try:
              data = json.loads(data_raw)
              if isinstance(data, str):
                  data = json.loads(data)
          except:
              data = {}

          data["tf"] = tf
          fname = f"data/ema_rsi_{tf}.json"
          with open(fname, "w") as f:
              json.dump(data, f, indent=2)

          print(f"✅ Saved {fname}")
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Commit va push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TF="${{ github.event.client_payload.tf }}"
          git add data/ema_rsi_${TF}.json
          git commit -m "Update EMA/RSI tf=${TF}" || echo "No changes"
          git pull --rebase origin main || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ducanhpham278-dotcom/gold---report---bot.git HEAD:main
