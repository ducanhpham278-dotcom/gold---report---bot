name: Gold Report Bot

on:
  schedule:
    - cron: "0 23 * * 6"
    - cron: "0 23 * * 0-5"
  workflow_dispatch:

jobs:
  run_all_reports:
    name: "Chay tat ca report"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Tin tuc tuan (Chi Nhat)
        if: github.event.schedule == '0 23 * * 6' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python report_weekly_news.py

      - name: Cho 2 phut sau weekly
        if: github.event.schedule == '0 23 * * 6' || github.event_name == 'workflow_dispatch'
        run: sleep 120

      - name: Tin tuc ngay (Thu 2 - Thu 7)
        if: github.event.schedule == '0 23 * * 0-5' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python report_daily_news.py

      - name: Cho 2 phut sau daily
        if: github.event.schedule == '0 23 * * 0-5' || github.event_name == 'workflow_dispatch'
        run: sleep 120

      - name: Phan tich vi mo (Thu 2 - Thu 7)
        if: github.event.schedule == '0 23 * * 0-5' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python report_macro.py

      - name: Cho 2 phut sau macro
        if: github.event.schedule == '0 23 * * 0-5' || github.event_name == 'workflow_dispatch'
        run: sleep 120

      - name: Range va Nen (Thu 2 - Thu 7)
        if: github.event.schedule == '0 23 * * 0-5' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python report_range.py
